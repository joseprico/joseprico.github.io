<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Campionat de Catalunya Juvenil 2025-26 · CN Terrassa Waterpolo</title>
<meta name="description" content="Quadre del Campionat de Catalunya Juvenil de waterpolo 2025-26.">
<link rel="icon" type="image/png" href="cnt-stats-192.png">

<script type="module">
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
  import { getDatabase, ref, onValue } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js';
  const firebaseConfig = {
    apiKey: "AIzaSyCmJwgJvh10LcpPjeWhLbN5EDYeHT3tAoU",
    authDomain: "cnt-wp-stats-bb7dc.firebaseapp.com",
    databaseURL: "https://cnt-wp-stats-bb7dc-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "cnt-wp-stats-bb7dc",
    storageBucket: "cnt-wp-stats-bb7dc.firebasestorage.app",
    messagingSenderId: "3430713575",
    appId: "1:3430713575:web:d580671a5d19049b187a42"
  };
  const app = initializeApp(firebaseConfig);
  window.fb = { db: getDatabase(app), ref, onValue };
  window.fbReady = true;
</script>

<style>
  :root {
    --bg-1: #1e3a5a;
    --bg-2: #1e4d6b;
    --bg-3: #0891b2;
    --accent: #22d3ee;
    --accent-soft: rgba(34, 211, 238, 0.15);
    --cnt-gold: #fbbf24;
    --card: rgba(255, 255, 255, 0.08);
    --card-strong: rgba(255, 255, 255, 0.14);
    --border: rgba(255, 255, 255, 0.12);
    --text: #f1f5f9;
    --text-soft: #cbd5e1;
    --text-faint: #94a3b8;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    min-height: 100vh;
    background: linear-gradient(135deg, var(--bg-1) 0%, var(--bg-2) 50%, var(--bg-3) 100%);
    background-attachment: fixed;
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    -webkit-font-smoothing: antialiased;
    padding: 24px 16px 48px;
  }
  .container { max-width: 1400px; margin: 0 auto; }
  .header { text-align: center; margin-bottom: 24px; }
  .header .kicker { text-transform: uppercase; letter-spacing: 0.32em; font-size: 11px; color: var(--text-faint); margin-bottom: 12px; }
  .header h1 { font-size: clamp(26px, 4.5vw, 42px); font-weight: 800; margin: 0 0 8px; letter-spacing: -0.02em; }
  .header .sub { color: var(--text-soft); font-size: 15px; margin: 0; }
  .header .meta { margin-top: 14px; font-size: 12px; color: var(--text-faint); text-transform: uppercase; letter-spacing: 0.18em; }
  .back-link {
    display: inline-flex; align-items: center; gap: 6px;
    color: var(--text-soft); text-decoration: none; font-size: 13px;
    margin-bottom: 20px; padding: 8px 14px; background: var(--card);
    border-radius: 20px; border: 1px solid var(--border);
  }
  .back-link:hover { background: var(--card-strong); }
  .admin-link { margin-left: 8px; background: rgba(34,211,238,0.18); border-color: rgba(34,211,238,0.4); color: #67e8f9; }

  .bracket { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 24px; margin-top: 12px; }
  .col { display: flex; flex-direction: column; gap: 18px; min-width: 0; }
  .col-head {
    text-align: center; text-transform: uppercase; letter-spacing: 0.2em;
    font-size: 12px; color: var(--text-faint);
    padding-bottom: 8px; border-bottom: 1px solid var(--border);
  }
  .subgroup { display: flex; flex-direction: column; gap: 10px; }
  .subgroup-label {
    text-align: center; font-size: 11px; text-transform: uppercase;
    letter-spacing: 0.16em; font-weight: 700; padding: 6px 10px;
    background: rgba(255,255,255,0.04); border-radius: 6px; color: var(--text-soft);
  }
  .subgroup-label.losers { color: #fca5a5; }
  .subgroup-label.winners { color: #86efac; }
  .subgroup-label.gold { color: var(--cnt-gold); background: rgba(251,191,36,0.08); }
  .subgroup-label.bronze { color: #f59e0b; }
  .subgroup-label.silver { color: #d1d5db; }

  .match { background: var(--card); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; backdrop-filter: blur(10px); }
  .match.has-cnt { border-color: var(--cnt-gold); box-shadow: 0 0 0 1px var(--cnt-gold), 0 4px 16px rgba(251,191,36,0.15); }
  .match-header {
    background: rgba(0, 0, 0, 0.2); padding: 6px 12px; font-size: 10px;
    text-transform: uppercase; letter-spacing: 0.16em; color: var(--text-faint);
    display: flex; justify-content: space-between; align-items: center;
  }
  .match-header .id { font-weight: 700; color: var(--text-soft); }
  .team { display: flex; align-items: center; gap: 10px; padding: 12px 14px; font-size: 14px; }
  .team + .team { border-top: 1px solid var(--border); }
  .team .seed { font-size: 11px; color: var(--text-faint); width: 18px; font-weight: 700; text-align: center; }
  .team .badge {
    width: 32px; height: 32px; border-radius: 50%; background: white;
    display: flex; align-items: center; justify-content: center;
    font-size: 10px; font-weight: 700; color: var(--bg-1); flex-shrink: 0;
    border: 1px solid var(--border); overflow: hidden; padding: 2px;
  }
  .team .badge img { width: 100%; height: 100%; object-fit: contain; }
  .team.tbd .badge { background: rgba(255, 255, 255, 0.08); color: var(--text-faint); padding: 0; }
  .team .name { flex: 1; font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .team .score { font-size: 16px; font-weight: 800; color: var(--text-faint); min-width: 24px; text-align: right; }
  .team.cnt .name { color: var(--cnt-gold); }
  .team.cnt .badge { box-shadow: 0 0 0 2px var(--cnt-gold); }
  .team.tbd .name { color: var(--text-faint); font-style: italic; font-weight: 500; }
  .team.tbd .badge { opacity: 0.4; }
  .team.winner { background: var(--accent-soft); }
  .team.winner .score { color: var(--accent); }
  .team.cnt.winner { background: rgba(251,191,36,0.18); }
  .team.cnt.winner .score { color: var(--cnt-gold); }
  .match-footer { padding: 6px 14px; font-size: 11px; color: var(--text-faint); background: rgba(0, 0, 0, 0.15); text-align: center; border-top: 1px solid var(--border); }
  .final-match { border-color: var(--accent); box-shadow: 0 4px 24px rgba(34, 211, 238, 0.2); }
  .final-match .match-header { background: linear-gradient(90deg, var(--accent), #0891b2); color: white; font-weight: 700; }
  .final-34 .match-header { background: rgba(180, 83, 9, 0.35); color: var(--cnt-gold); }
  .final-56 .match-header { background: rgba(100,116,139,0.4); color: #e2e8f0; }
  .final-78 .match-header { background: rgba(71,85,105,0.45); color: #cbd5e1; }

  @media (max-width: 900px) { .bracket { grid-template-columns: 1fr; gap: 16px; } }

  .champion-box {
    margin-top: 32px; padding: 24px; text-align: center;
    background: var(--card); border: 1px dashed var(--border); border-radius: 12px;
  }
  .champion-box .label { text-transform: uppercase; letter-spacing: 0.3em; font-size: 11px; color: var(--text-faint); margin-bottom: 8px; }
  .champion-box .winner-name { font-size: 22px; font-weight: 800; color: var(--text-faint); font-style: italic; }
  .champion-box.has-champion .winner-name { color: var(--cnt-gold); font-style: normal; }
  .legend { margin-top: 28px; display: flex; justify-content: center; gap: 18px; flex-wrap: wrap; font-size: 12px; color: var(--text-faint); }
  .legend .item { display: flex; align-items: center; gap: 6px; }
  .legend .swatch { width: 12px; height: 12px; border-radius: 3px; border: 1px solid var(--border); }
  .legend .swatch.cnt { background: var(--cnt-gold); }
  .legend .swatch.winner { background: var(--accent); }
  .legend .swatch.tbd { background: var(--card); }
</style>
</head>
<body>
<div class="container">
  <a href="index.html" class="back-link">← Tornar a estadístiques de lliga</a>

  <header class="header">
    <div class="kicker">CN Terrassa Waterpolo</div>
    <h1>Campionat de Catalunya Juvenil</h1>
    <p class="sub">Temporada 2025-26 · Fase final</p>
    <div class="meta">Quarts · Semifinals (5-8 i 1-4) · Finals</div>
  </header>

  <div class="bracket" id="bracketHost"></div>

  <div class="champion-box" id="championBox">
    <div class="label">Campió de Catalunya Juvenil 2025-26</div>
    <div class="winner-name">Per determinar</div>
  </div>

  <div class="legend">
    <div class="item"><span class="swatch cnt"></span>CN Terrassa</div>
    <div class="item"><span class="swatch winner"></span>Guanyador</div>
    <div class="item"><span class="swatch tbd"></span>Per determinar</div>
  </div>
</div>

<script>
const TEAM = 'juvenil';
const TEAMS = [
  null,
  { name: 'C.N. Sabadell',  short: 'C.N. Sabadell',          logo: 'https://cdn.leverade.com/thumbnails/AaJFwTq1SdZo.90x90.jpg' },
  { name: 'Barceloneta',    short: 'C.N. Atl. Barceloneta',  logo: 'https://cdn.leverade.com/thumbnails/AaS9iMCevN9M.90x90.jpg' },
  { name: 'C.N. Barcelona', short: 'C.N. Barcelona',         logo: 'https://cdn.leverade.com/thumbnails/AaT38Tf1E4Fg.90x90.jpg' },
  { name: "U.E. d'Horta",   short: "U.E. d'Horta",           logo: 'https://cdn.leverade.com/thumbnails/AaEBEa7OVvwB.90x90.jpg' },
  { name: 'Mediterrani',    short: 'C.E. Mediterrani',       logo: 'https://cdn.leverade.com/thumbnails/AasntmnZMsxi.90x90.jpg' },
  { name: 'Sant Andreu',    short: 'C.N. Sant Andreu',       logo: 'https://cdn.leverade.com/thumbnails/AaTcV9fsgKzp.90x90.jpg' },
  { name: 'C.N. Terrassa',  short: 'C.N. Terrassa',          logo: 'https://cdn.leverade.com/thumbnails/rfen_f74fa6fe.90x90.jpg', isCnt: true },
  { name: 'Montjuïc',       short: 'C.N. Montjuïc',          logo: null }
];

const MATCHES = [
  { id: 'QF1', col: 'qf',     round: 'qf',         s1: { t: 'seed',   v: 1 },     s2: { t: 'seed',   v: 8 }     },
  { id: 'QF2', col: 'qf',     round: 'qf',         s1: { t: 'seed',   v: 4 },     s2: { t: 'seed',   v: 5 }     },
  { id: 'QF3', col: 'qf',     round: 'qf',         s1: { t: 'seed',   v: 2 },     s2: { t: 'seed',   v: 7 }     },
  { id: 'QF4', col: 'qf',     round: 'qf',         s1: { t: 'seed',   v: 3 },     s2: { t: 'seed',   v: 6 }     },
  { id: 'SF1', col: 'sf',     round: 'sf-losers',  s1: { t: 'loser',  v: 'QF1' }, s2: { t: 'loser',  v: 'QF2' } },
  { id: 'SF2', col: 'sf',     round: 'sf-losers',  s1: { t: 'loser',  v: 'QF3' }, s2: { t: 'loser',  v: 'QF4' } },
  { id: 'SF3', col: 'sf',     round: 'sf-winners', s1: { t: 'winner', v: 'QF1' }, s2: { t: 'winner', v: 'QF2' } },
  { id: 'SF4', col: 'sf',     round: 'sf-winners', s1: { t: 'winner', v: 'QF3' }, s2: { t: 'winner', v: 'QF4' } },
  { id: 'F78', col: 'finals', round: 'final-78',   s1: { t: 'loser',  v: 'SF1' }, s2: { t: 'loser',  v: 'SF2' } },
  { id: 'F56', col: 'finals', round: 'final-56',   s1: { t: 'winner', v: 'SF1' }, s2: { t: 'winner', v: 'SF2' } },
  { id: 'F34', col: 'finals', round: 'final-34',   s1: { t: 'loser',  v: 'SF3' }, s2: { t: 'loser',  v: 'SF4' } },
  { id: 'F',   col: 'finals', round: 'final',      s1: { t: 'winner', v: 'SF3' }, s2: { t: 'winner', v: 'SF4' } }
];
const LABELS = { QF1:'QF1', QF2:'QF2', QF3:'QF3', QF4:'QF4', SF1:'SF (5-8) A', SF2:'SF (5-8) B', SF3:'SF (1-4) A', SF4:'SF (1-4) B', F78:'7è/8è lloc', F56:'5è/6è lloc', F34:'3r/4t lloc', F:'FINAL' };
const HINTS  = { QF1:'1 vs 8', QF2:'4 vs 5', QF3:'2 vs 7', QF4:'3 vs 6', SF1:'Perd. QF1·QF2', SF2:'Perd. QF3·QF4', SF3:'Guany. QF1·QF2', SF4:'Guany. QF3·QF4', F78:'Perd. SF (5-8)', F56:'Guany. SF (5-8)', F34:'Perd. SF (1-4)', F:'★' };

let DATA = {};

function resolve(side, results) {
  if (side.t === 'seed') { const t = TEAMS[side.v]; return t ? { ...t, seed: side.v } : null; }
  const dep = MATCHES.find(m => m.id === side.v);
  const r = results[side.v];
  if (!r || r.score1 == null || r.score2 == null) return null;
  const t1 = resolve(dep.s1, results), t2 = resolve(dep.s2, results);
  if (!t1 || !t2) return null;
  const w = Number(r.score1) > Number(r.score2);
  return side.t === 'winner' ? (w ? t1 : t2) : (w ? t2 : t1);
}

function fmtDate(iso) {
  if (!iso) return null;
  const d = new Date(iso); if (isNaN(d.getTime())) return null;
  return `${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')} · ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}

function teamHtml(t, score, isWinner, isLoser, showSeed) {
  if (!t) return `<div class="team tbd"><span class="seed">–</span><span class="badge">?</span><span class="name">Per determinar</span><span class="score">–</span></div>`;
  const badge = t.logo ? `<img src="${t.logo}" alt="${t.short}">` : t.short.slice(0,3).toUpperCase();
  const cls = ['team']; if (t.isCnt) cls.push('cnt'); if (isWinner) cls.push('winner'); if (isLoser) cls.push('loser');
  return `<div class="${cls.join(' ')}"><span class="seed">${showSeed && t.seed ? t.seed : ''}</span><span class="badge">${badge}</span><span class="name">${t.short}</span><span class="score">${score != null ? score : '–'}</span></div>`;
}

function matchHtml(m, results) {
  const r = results[m.id] || {};
  const t1 = resolve(m.s1, results), t2 = resolve(m.s2, results);
  const has = r.score1 != null && r.score2 != null;
  const w1 = has && Number(r.score1) > Number(r.score2);
  const cnt = (t1 && t1.isCnt) || (t2 && t2.isCnt);
  const cls = ['match']; if (cnt) cls.push('has-cnt');
  if (m.round === 'final') cls.push('final-match');
  if (m.round === 'final-34') cls.push('final-34');
  if (m.round === 'final-56') cls.push('final-56');
  if (m.round === 'final-78') cls.push('final-78');
  const dt = fmtDate(r.scheduledAt);
  const footer = dt ? `<div class="match-footer">📅 ${dt}</div>` : `<div class="match-footer">Data per determinar</div>`;
  const showSeed = m.col === 'qf';
  return `<div class="${cls.join(' ')}">
    <div class="match-header"><span class="id">${LABELS[m.id]}</span><span>${HINTS[m.id]}</span></div>
    ${teamHtml(t1, has ? r.score1 : null, has && w1, has && !w1, showSeed)}
    ${teamHtml(t2, has ? r.score2 : null, has && !w1, has && w1, showSeed)}
    ${footer}
  </div>`;
}

function render() {
  const host = document.getElementById('bracketHost');
  const r = DATA;
  const find = id => MATCHES.find(m => m.id === id);
  const qf = ['QF1','QF2','QF3','QF4'].map(find);
  const sfL = ['SF1','SF2'].map(find);
  const sfW = ['SF3','SF4'].map(find);
  host.innerHTML = `
    <div class="col">
      <div class="col-head">Quarts de final</div>
      ${qf.map(m => matchHtml(m, r)).join('')}
    </div>
    <div class="col">
      <div class="col-head">Semifinals</div>
      <div class="subgroup">
        <div class="subgroup-label losers">Pels llocs 5è–8è</div>
        ${sfL.map(m => matchHtml(m, r)).join('')}
      </div>
      <div class="subgroup">
        <div class="subgroup-label winners">Pels llocs 1r–4t</div>
        ${sfW.map(m => matchHtml(m, r)).join('')}
      </div>
    </div>
    <div class="col">
      <div class="col-head">Finals</div>
      <div class="subgroup"><div class="subgroup-label">7è / 8è lloc</div>${matchHtml(find('F78'), r)}</div>
      <div class="subgroup"><div class="subgroup-label silver">5è / 6è lloc</div>${matchHtml(find('F56'), r)}</div>
      <div class="subgroup"><div class="subgroup-label bronze">3r / 4t lloc</div>${matchHtml(find('F34'), r)}</div>
      <div class="subgroup"><div class="subgroup-label gold">FINAL</div>${matchHtml(find('F'), r)}</div>
    </div>
  `;
  const finalR = r['F'];
  const champBox = document.getElementById('championBox');
  if (finalR && finalR.score1 != null && finalR.score2 != null) {
    const winner = resolve({ t: 'winner', v: 'F' }, r);
    if (winner) {
      champBox.classList.add('has-champion');
      champBox.querySelector('.winner-name').textContent = `🏆 ${winner.name}`;
    }
  }
}

function init() {
  if (!window.fbReady) { setTimeout(init, 200); return; }
  const r = window.fb.ref(window.fb.db, `championship/${TEAM}`);
  window.fb.onValue(r, snap => { DATA = snap.val() || {}; render(); });
}
render(); init();
</script>
</body>
</html>
